<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendlyCode.Ai — AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="web.css">
</head>
<body>

    <!-- SIDEBAR OVERLAY (MOBILE) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.webp" alt="Logo" class="sidebar-logo-img">
            <span class="sidebar-title">FriendlyCode.Ai</span>
        </div>
        <button class="new-chat-btn" onclick="newChat(); if(window.innerWidth<=768) closeSidebar();">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Chat
        </button>
        <div class="sidebar-history" id="historyList"></div>
        <div class="sidebar-footer">
            <div class="sidebar-user" onclick="logout()">
                <img id="userPhoto" class="user-avatar-img" src="" alt="Profile">
                <span class="user-name" id="sidebarUsername">User</span>
                <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main" id="mainContent">
        <header class="header">
            <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="header-center" id="headerTitle">New Chat</div>
            <div class="header-right">
                <span class="token-badge" id="tokenBadge">
                    <span class="token-count" id="tokenCount">3</span> Tokens left
                </span>
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcomeScreen">
                <h2>Halo! Ada yang bisa dibantu?</h2>
                <p>Tanya seputar coding, debugging, atau konsep programming.</p>
                <div class="suggestions">
                    <button class="suggestion-chip" onclick="askSuggestion('Buatkan navbar responsive dengan HTML CSS')">Buatkan navbar responsive</button>
                    <button class="suggestion-chip" onclick="askSuggestion('Jelaskan konsep async/await di JavaScript')">Jelaskan async/await</button>
                    <button class="suggestion-chip" onclick="askSuggestion('Debug: TypeError undefined is not a function')">Debug TypeError</button>
                    <button class="suggestion-chip" onclick="askSuggestion('Buatkan fungsi fetch API dengan error handling')">Fetch API example</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="ngobrol" onclick="setMode('ngobrol', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        Ngobrol
                    </button>
                    <button class="mode-btn" data-mode="ngoding" onclick="setMode('ngoding', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                        Ngoding
                    </button>
                    <button class="mode-btn" data-mode="vip" onclick="setMode('vip', this)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        VIP
                    </button>
                </div>
                <div class="input-wrapper">
                    <textarea class="input-field" id="messageInput" placeholder="Ngobrol..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="kirimPesan()" disabled>
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- POPUP PEMBELIAN -->
    <div class="purchase-overlay" id="purchaseOverlay" onclick="closePurchasePopup()"></div>
    <div class="purchase-popup" id="purchasePopup" onclick="event.stopPropagation()">
        <div class="purchase-popup-header">
            <span>Upgrade Paket</span>
            <button class="purchase-close" onclick="closePurchasePopup()">✕</button>
        </div>
        <div class="purchase-popup-body" id="purchasePopupBody"></div>
    </div>

    <script src="web.js"></script>
</body>
</html>
